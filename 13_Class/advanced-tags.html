<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced-Tags</title>
</head>

<body>
    <label>Choose Your Country</label><br>
    <select>
        <option>Pakistan</option>
        <option>USA</option>
        <option>India</option>
        <option>German</option>
        <option>Farance</option>
        <option>Rassia</option>
    </select>
    <br><br><br>
    <label for="">Message:</label><br>
    <textarea name="" id="" placeholder="Enter your msg here" rows="5" cols="30"></textarea>
    <label for="">Volume</label>
    <input type="range" min="0" max="100" value="0">
    <!-- meter tag -->
     <label>Disk Usage</label>
    <meter min="0" max="100" value="60">
    </meter>
        <progress value="60" max="100">
</progress>
</body>

</html>
