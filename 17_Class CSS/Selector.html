<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selectors</title>
    <style>
        /* universal Selectors */
        *{
           margin: 90;
           padding: 90;
           background-color: orange;
        }
        /* element selector  */
        h2{
            background-color: purple;
        }
        /* group selector */
        p, span {
            background-color: yellowgreen;
        }
        /* Child Selector  */
        div > p {
            background-color: aqua;
        }
    </style>
</head>
<body>
    <div>
        <h1>Hello World </h1>
        <p>This is a world that is use in programming more than me..</p>
    </div>
    <h2>I am a sub-heading</h2>
    <p>Hello I am a para</p>
    <span>Hello am a span</span>
</body>
</html>
