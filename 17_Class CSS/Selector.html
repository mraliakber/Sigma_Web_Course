<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selectors</title>
    <style>
        /* universal Selectors */
        *{
           margin: 90;
           padding: 90;
           background-color: orange;
        }
        /* element selector  */
        h2{
            background-color: purple;
        }
        /* group selector */
        p, span {
            background-color: yellowgreen;
        }
        /* Child Selector  */
        div > p {
            background-color: aqua;
        }
        #One {
                text-decoration: underline;
        }
        .Para{
            background-color: violet;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <section id="One">
        <ol>
            <li>Apple</li>
            <li>Banana</li>
            <li>Mango</li>
        </ol>
    </section>
    <div>
        <h1>Hello World </h1>
        <p>This is a world that is use in programming more than me..</p>
    </div>
    <h2>I am a sub-heading</h2>
    <p>Hello I am a para</p>
    <span>Hello am a span</span>
    <p class="Para">Hey Am Para 1</p>
    <p class="Para">Hey AM para 2</p>
    <p class="Para">Hey Am para 3</p>
    <p class="Para">Hey Am para 4</p>
</body>
</html>
