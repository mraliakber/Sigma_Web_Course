<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>background-color</title>
    <style>
        body{
            text-align: center;
            margin: 0;
            padding: 0;
            line-height: 100px;
        }
        h1{background-color: #154715;}
        h2{background-color: #152647;}
        h3{background-color: #47153C;}
        h4{background-color: #964E29;}
        h5{background-color: #8C2020;}
    </style>
</head>
<body>
    <h1>Hello World</h1>
    <h2>Hello World</h2>
    <h3>Hello World</h3>
    <h4>Hello World</h4>
    <h5>Hello World</h5>

</body>
</html>
