<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Alignment</title>
    <style>
        h1 {
            text-align: center;
        }

        #para2 {
            text-align: end;
        }

        #para3 { 
            text-align: justify;
        }
        #para4{
            text-align: right;
        }
        #para5{
            text-align: left;
        }
            </style>
</head>

<body>
    <h1>Text-Alignment</h1>
    <p id="para2">Am A para 2</p>
    <p id="para1">Am A para 1</p>
    <p id="para3">Am A para 3</p>
    <p id="para4">Am A para 4</p>
    <p id="para5">Am A para 4</p>
</body>

</html>
