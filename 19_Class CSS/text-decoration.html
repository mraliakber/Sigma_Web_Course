<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text-Decoration</title>
    <style>
      #para1{
        text-decoration: underline;
      }
      #para2{
        text-decoration: overline;
      }
      #para3{
        text-decoration: line-through;
      }
      #para4{
        text-decoration: underline;
        text-decoration-style: wavy;
      }
    </style>
</head>
<body>
    <p id="para1">Hello, I'm a Para 1</p>
    <p id="para2">Hello, I'm a Para 2</p>
    <p id="para3">Hello, I'm a Para 3</p>
    <p id="para4">Hello, I'm a Para 4</p>
</body>
</html>
