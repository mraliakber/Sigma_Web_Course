<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Transform</title>
    <style>
        #one{text-transform: uppercase;}
        #two{text-transform: lowercase;}
        #three{text-transform: capitalize;}
        #four{text-transform:  none;}
    </style>
</head>
<body>
    <p id="one">Hey, Am Ali</p>
    <p id="two">Hey, Am Ali</p>
    <p id="three">Hey, Am Ali</p>
    <p id="four">Hey, Am Ali</p>
</body>
</html>
