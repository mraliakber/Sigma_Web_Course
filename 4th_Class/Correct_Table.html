<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <link rel="stylesheet" href="style.css">
</head> 
<body>
    <style>
        table{
            background-color: aqua;
        }
        th{
            border: 3px solid rgb(0, 47, 255) ;
        }
        caption{
            background-color: rgb(226, 43, 171);
        }
    </style>
    <table>
        <caption>Student Details</caption>
        <thead>
            <tr>
                <th>Name</th>
                <th>Class</th>
                <th>Subject</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Ali</td>
                <td>ICS</td>
                <td>Computer</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td>Umar</td>
                <td>FSC</td>
                <td>English</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
