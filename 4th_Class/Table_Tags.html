<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Table Tags</title>
</head>
<body>
    <table>
        <tr>

            <th>Class</th>
            <th>Roll No</th>
        </tr>
        <tr>
            <td>Ali</td>
            <td>ICS</td>
            <td rowspan="2">786</td>
        </tr>
        <tr>
            <td colspan="2">Ahmad</td>
            <!-- <td>FSC</td> -->
            <td>789 </td>
        </tr>
    </table>
</body>
</html>
